name: GUI CI Suite

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  lint-gui:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check clang-format for GUI
        run: |
          find gui -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \) -print0 | xargs -0 clang-format --dry-run --Werror

  build-and-test-gui:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Make configuration
        run: cmake -B build -DZAPPY_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Compilation
        run: cmake --build build --config Release --target zappy_gui zappy_tests -j 4

      - name: Tests
        working-directory: ${{github.workspace}}/build
        run: ctest -C Release --output-on-failure -E zappy_ai_tests
