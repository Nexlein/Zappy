name: C/C++ CI Pipeline & Epitech Mirror

# Workflow triggers
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- LINT ---
  lint:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          find . -type f \( -name "*.cpp" -o -name "*.hpp" \) -print0 | xargs -0 clang-format --dry-run --Werror

  # --- BUILD AND TEST ---
  build-and-test:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Make configuration
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

      - name: Compilation
        run: cmake --build ${{github.workspace}}/build --config Release -j 4

      - name: Tests
        working-directory: ${{github.workspace}}/build
        run: ctest -C Release --output-on-failure

  # --- MIRROR TO EPITECH ---
  mirror_to_epitech:
    if: github.repository == 'Nexlein/Zappy'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    needs: [ lint, build-and-test ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Push to Epitech Mirror
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add epitechZappy git@github.com:EpitechPGE2-2025/G-YEP-400-MPL-4-1-zappy-1.git
          git push epitechZappy HEAD:main
