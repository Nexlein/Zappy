name: C/C++ & Python CI Pipeline & Epitech Mirror

# Workflow triggers
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # --- LINT C/C++ ---
  lint-cpp:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          find . -type d \( -name "build" -o -name ".git" -o -name ".vscode" -o -name ".ruff_cache" \) -prune -o -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \) -print0 | xargs -0 clang-format --dry-run --Werror

  # --- LINT PYTHON ---
  lint-python:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: python3 -m pip install --user ruff

      - name: Check ruff formatting
        run: |
          python3 -m ruff format --check .
          python3 -m ruff check --select F --show-source .

  # --- BUILD & TEST SERVER ---
  build-and-test-server:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Make configuration
        run: cmake -S server -B server/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Compilation
        run: cmake --build server/build --config Release -j 4

      - name: Tests
        working-directory: ${{github.workspace}}/server/build
        run: ctest -C Release --output-on-failure

  # --- BUILD & TEST GUI ---
  build-and-test-gui:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Make configuration
        run: cmake -B build -DZAPPY_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Compilation
        run: cmake --build build --config Release --target zappy_gui zappy_tests -j 4

      - name: Tests
        working-directory: ${{github.workspace}}/build
        run: ctest -C Release --output-on-failure -E zappy_ai_tests

  # --- BUILD & TEST AI ---
  build-and-test-ai:
    if: github.repository == 'Nexlein/Zappy'
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run AI tests
        run: PYTHONPATH=ai/src python3 -m unittest discover -s tests/ai -p "test_*.py"

  # --- MIRROR TO EPITECH ---
  mirror_to_epitech:
    if: >
      github.repository == 'Nexlein/Zappy' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    needs: [ lint-cpp, lint-python, build-and-test-server, build-and-test-gui, build-and-test-ai ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Push to Epitech Mirror
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add epitechZappy git@github.com:EpitechPGE2-2025/G-YEP-400-MPL-4-1-zappy-1.git
          git push epitechZappy HEAD:main
